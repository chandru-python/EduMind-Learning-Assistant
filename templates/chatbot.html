<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor Chat | EduMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar styling for seamless look */
        .chat-scrollbar::-webkit-scrollbar { width: 6px; }
        .chat-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .chat-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 8px; }
        .chat-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-900 antialiased h-dvh flex flex-col overflow-hidden">

    <header class="h-16 border-b border-slate-200/80 bg-white/80 backdrop-blur-md flex items-center justify-between px-6 z-10 flex-shrink-0">
        <div class="flex items-center gap-3.5">
            <a href="/" class="text-xl font-bold bg-gradient-to-r from-indigo-600 via-violet-600 to-fuchsia-600 bg-clip-text text-transparent flex items-center gap-2 hover:opacity-90 transition-opacity">
                EduMind AI
            </a>
            <span class="text-[11px] font-semibold px-2 py-0.5 bg-indigo-50 text-indigo-700 rounded-md border border-indigo-100/80 tracking-wide">Workspace</span>
        </div>
        <div class="flex items-center gap-5">
            <a href="/about" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors duration-200">About</a>
            <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white flex items-center justify-center font-semibold text-sm shadow-md shadow-indigo-600/10 cursor-pointer hover:scale-105 transition-transform duration-200">
                ME
            </div>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        
        <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200/80 p-4 justify-between flex-shrink-0">
            <div class="space-y-6">
                <div>
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3 px-2">Active Subject Focus</h3>
                    <div class="space-y-1">
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-semibold rounded-xl text-indigo-700 bg-indigo-50/60 border border-indigo-100/40 pointer-events-none">
                            <span class="text-base">⚛️</span> Physics
                        </button>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                            <span class="text-base group-hover:scale-110 transition-transform">🧪</span> Chemistry
                        </button>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                            <span class="text-base group-hover:scale-110 transition-transform">🧬</span> Biology
                        </button>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all duration-200 group">
                            <span class="text-base group-hover:scale-110 transition-transform">📐</span> Mathematics
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-slate-100 pt-4 px-1">
                <a href="/" class="flex items-center gap-2 text-xs font-semibold text-slate-500 hover:text-rose-600 transition-colors duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"/></svg>
                    Exit Chat Room
                </a>
            </div>
        </aside>

        <main class="flex-grow flex flex-col justify-between bg-slate-50/60 h-full relative">
            
            <div id="chat-feed" class="flex-grow overflow-y-auto p-4 sm:p-6 space-y-6 chat-scrollbar">
                
                <div class="flex gap-4 max-w-3xl mr-auto items-start">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-600 text-white flex items-center justify-center text-xs flex-shrink-0 shadow-md shadow-indigo-600/10 font-bold">AI</div>
                    <div class="bg-white border border-slate-200/60 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm shadow-slate-100/50 text-sm text-slate-800 leading-relaxed">
                        Hello! I am your AI educational assistant. Ask me anything about physics, chemistry, biology, or mathematics, and let's break down the concepts together.
                    </div>
                </div>

                </div>

            <div id="loading-indicator" class="hidden px-6 py-3 max-w-3xl mr-auto ml-12 flex items-center gap-2 text-slate-400 text-xs font-medium bg-white/60 backdrop-blur-sm border border-slate-200/40 rounded-full shadow-sm mb-2">
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                </div>
                <span class="ml-1 text-slate-500">Tutor is drafting an explanation...</span>
            </div>

            <div class="p-4 sm:p-6 bg-white border-t border-slate-200/80 flex-shrink-0 shadow-lg shadow-slate-100">
                <div class="max-w-3xl mx-auto relative flex items-center">
                    <input 
                        type="text" 
                        id="question" 
                        placeholder="Ask a question... (e.g., Explain Newton's laws of motion)" 
                        class="w-full pl-4 pr-20 py-3.5 rounded-xl border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-4 focus:ring-indigo-600/5 focus:border-indigo-600 bg-slate-50/50 transition-all text-sm"
                        onkeydown="if(event.key === 'Enter') askQuestion()"
                    >
                    <button 
                        onclick="askQuestion()" 
                        class="absolute right-2.5 px-4 py-2 text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-95 rounded-lg shadow-md shadow-indigo-600/10 transition-all focus:outline-none cursor-pointer flex items-center gap-1.5"
                    >
                        <span>Ask</span>
                        <svg class="w-3.5 h-3.5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script>
        async function askQuestion() {
            const inputField = document.getElementById("question");
            const chatFeed = document.getElementById("chat-feed");
            const loadingIndicator = document.getElementById("loading-indicator");
            
            const questionText = inputField.value.trim();
            if (!questionText) return; // Prevent empty execution

            // 1. Render User Message Node immediately in Chat Feed
            appendMessage(questionText, 'user');
            
            // Clear entry field and show loader
            inputField.value = "";
            loadingIndicator.classList.remove('hidden');
            autoScroll();

            try {
                // 2. Fetch API pipeline request
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: questionText })
                });

                if (!response.ok) throw new Error('Network execution fault occurred.');

                const data = await response.json();
                
                // 3. Render API Response Node inside feed
                appendMessage(data.answer, 'bot');

            } catch (error) {
                console.error("System Error Details:", error);
                appendMessage("Sorry, I encountered an issue connecting to the system pipeline. Please try again.", 'error');
            } finally {
                // Remove loading animations state
                loadingIndicator.classList.add('hidden');
                autoScroll();
            }
        }

        // Helper structure mapping functional dynamic message bubble generation
        function appendMessage(text, sender) {
            const chatFeed = document.getElementById("chat-feed");
            const wrapper = document.createElement('div');
            
            if (sender === 'user') {
                wrapper.className = "flex gap-4 max-w-3xl ml-auto flex-row-reverse items-start";
                wrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-slate-900 text-white flex items-center justify-center text-xs flex-shrink-0 shadow-md font-bold">ME</div>
                    <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-none px-4 py-3 shadow-md shadow-indigo-600/5 text-sm leading-relaxed"></div>
                `;
                wrapper.querySelector('div:nth-child(2)').textContent = text; // Safe injection method avoiding raw text elements
            } else if (sender === 'bot') {
                wrapper.className = "flex gap-4 max-w-3xl mr-auto items-start";
                wrapper.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-600 text-white flex items-center justify-center text-xs flex-shrink-0 shadow-md shadow-indigo-600/10 font-bold">AI</div>
                    <div class="bg-white border border-slate-200/60 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm shadow-slate-100/50 text-sm text-slate-800 leading-relaxed"></div>
                `;
                wrapper.querySelector('div:nth-child(2)').textContent = text;
            } else { // Error handling representation
                wrapper.className = "flex gap-4 max-w-3xl mx-auto justify-center";
                wrapper.innerHTML = `
                    <div class="bg-rose-50 border border-rose-200 text-rose-700 text-xs px-4 py-2.5 rounded-xl font-medium shadow-sm"></div>
                `;
                wrapper.querySelector('div').textContent = text;
            }

            chatFeed.appendChild(wrapper);
        }

        function autoScroll() {
            const chatFeed = document.getElementById("chat-feed");
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }
    </script>
</body>
</html>
